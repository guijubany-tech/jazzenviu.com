<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jazzenviu</title>
  <meta name="description" content="Web oficial de Jazzenviu.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #090806;
      --fg: #f4ead7;
      --muted: #b9aa8f;
      --gold: #c8a45d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1c1710, var(--bg) 58%);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(920px, calc(100% - 40px));
      padding: 72px 0;
      text-align: center;
    }
    .eyebrow {
      margin: 0 0 18px;
      color: var(--gold);
      letter-spacing: .24em;
      text-transform: uppercase;
      font-size: 13px;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(54px, 11vw, 136px);
      line-height: .9;
      font-weight: 500;
    }
    p {
      max-width: 620px;
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Associació de jazz</p>
    <h1>Jazzenviu</h1>
    <p>Nova web en construcció. Estem preparant l’espai digital de Jazzenviu.</p>
  </main>
</body>
</html>
